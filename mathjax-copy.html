<script>
  document.addEventListener('copy', (event) => {
    const selection = window.getSelection();
    if (!selection || selection.rangeCount === 0) return;

    let finalResults = [];

    for (let i = 0; i < selection.rangeCount; i++) {
        const range = selection.getRangeAt(i);
        
        const container = range.commonAncestorContainer.nodeType === 1 
            ? range.commonAncestorContainer 
            : range.commonAncestorContainer.parentNode;

        const mathItems = MathJax.startup.document.getMathItemsWithin(container);
        
        const clonedContents = range.cloneContents();
        const tempDiv = document.createElement('div');
        tempDiv.appendChild(clonedContents);

        mathItems.forEach((item) => {
            if (range.intersectsNode(item.start.node)) {
                const renderedElements = tempDiv.querySelectorAll('mjx-container');
                
                renderedElements.forEach(el => {
                    const texSource = item.start.delim + item.math + item.end.delim;
                    el.replaceWith(texSource);
                });
            }
        });
        finalResults.push(tempDiv.textContent || tempDiv.innerText);
    }

    const combinedString = finalResults.join('');
    
    console.log('Copied with TeX Equations:', combinedString);

    event.clipboardData.setData('text/plain', combinedString);
    event.preventDefault();
});
</script>
